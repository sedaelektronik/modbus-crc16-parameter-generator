<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modbus CRC16 Calculator - 2025</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            color: #e0e0e0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 {
            margin: 0 0 20px;
            font-size: 24px;
            color: #00d4ff;
            text-align: center;
            letter-spacing: 1px;
        }
        label {
            font-size: 14px;
            color: #b0b0b0;
            margin-bottom: 8px;
            display: block;
        }
        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #00d4ff, #007bff);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(45deg, #00eaff, #008cff);
        }
        button:active {
            transform: translateY(0);
        }
        .result-container {
            background: rgba(0, 212, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .result-container.error {
            background: rgba(255, 75, 75, 0.1);
            color: #ff4b4b;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .result-row:last-child {
            margin-bottom: 0;
        }
        .result-label {
            color: #b0b0b0;
            font-size: 13px;
        }
        .result-value {
            color: #00d4ff;
            font-weight: bold;
            font-family: monospace;
            font-size: 15px;
            letter-spacing: 1px;
        }
        .full-frame {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .full-frame .result-value {
            font-size: 13px;
            word-break: break-all;
        }
        .copy-btn {
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
            margin-left: 10px;
        }
        .copy-btn:hover {
            background: rgba(0, 212, 255, 0.3);
            transform: none;
        }
        #copyMsg {
            font-size: 11px;
            color: #00ffaa;
            text-align: center;
            height: 14px;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Modbus CRC16 Calculator</h2>
        <label for="inputText">Hex Input — son 2 byte CRC placeholder olmalı (örn: 01 05 02 05 00 32 00 00)</label>
        <input type="text" id="inputText" placeholder="Hex değer girin (örn: 01 05 02 05 00 32 00 00)">
        <div class="button-group">
            <button onclick="calculateCRC('big')">Big Endian</button>
            <button onclick="calculateCRC('little')">Little Endian</button>
        </div>
        <div class="result-container" id="resultContainer">
            <div class="result-row">
                <span class="result-label">CRC16:</span>
                <span class="result-value" id="result">—</span>
            </div>
            <div class="full-frame" id="fullFrameRow" style="display:none;">
                <div class="result-row">
                    <span class="result-label">Tam Frame:</span>
                    <div style="display:flex; align-items:center; flex-wrap:wrap; gap:4px; justify-content:flex-end;">
                        <span class="result-value" id="fullFrame"></span>
                        <button class="copy-btn" onclick="copyFrame()">Kopyala</button>
                    </div>
                </div>
                <div id="copyMsg"></div>
            </div>
        </div>
    </div>

    <script>
        function calculateCRC(endianType) {
            let crc = 0xFFFF;
            let mesaj = document.getElementById("inputText").value.trim().toUpperCase();
            let resultElement = document.getElementById("result");
            let resultContainer = document.getElementById("resultContainer");
            let fullFrameRow = document.getElementById("fullFrameRow");

            // Boşlukları ve 0x prefix'leri temizle
            let mesajTemiz = "";
            for (let j = 0; j < mesaj.length; j++) {
                if (mesaj.substring(j, j + 2) === "0X") {
                    j++;
                } else if (mesaj[j] !== " ") {
                    mesajTemiz += mesaj[j];
                }
            }

            if (mesajTemiz.length % 2 !== 0) {
                resultElement.textContent = "Hata: Eksik byte!";
                resultContainer.classList.add("error");
                fullFrameRow.style.display = "none";
                return;
            }

            if (mesajTemiz.length < 6) {
                resultElement.textContent = "Hata: En az 3 byte gerekli!";
                resultContainer.classList.add("error");
                fullFrameRow.style.display = "none";
                return;
            }

            resultContainer.classList.remove("error");

            // CRC hesapla: son 2 byte (CRC placeholder) hariç
            let dataBoyu = mesajTemiz.length - 4;

            for (let k = 0; k < dataBoyu; k += 2) {
                let mesajByte = mesajTemiz.substring(k, k + 2);
                let mesajByteSayi = parseInt(mesajByte, 16);

                crc = crc ^ mesajByteSayi;
                for (let i = 0; i < 8; i++) {
                    if (crc & 0x0001) {
                        crc = (crc >> 1) ^ 0xA001;
                    } else {
                        crc = crc >> 1;
                    }
                }
            }

            // Endian tipine göre byte sırası
            let crcByte1, crcByte2;
            if (endianType === "little") {
                crcByte1 = (crc & 0x00FF).toString(16).toUpperCase().padStart(2, '0');
                crcByte2 = ((crc & 0xFF00) >> 8).toString(16).toUpperCase().padStart(2, '0');
            } else {
                crcByte1 = ((crc & 0xFF00) >> 8).toString(16).toUpperCase().padStart(2, '0');
                crcByte2 = (crc & 0x00FF).toString(16).toUpperCase().padStart(2, '0');
            }

            resultElement.textContent = crcByte1 + " " + crcByte2;

            // Data byte'larını al (son 2 byte hariç)
            let dataBytes = [];
            for (let k = 0; k < dataBoyu; k += 2) {
                dataBytes.push(mesajTemiz.substring(k, k + 2));
            }

            // Tam frame: data + hesaplanan CRC
            let fullFrameStr = [...dataBytes, crcByte1, crcByte2].join(" ");
            document.getElementById("fullFrame").textContent = fullFrameStr;

            // Input alanını güncelle: son 2 byte = hesaplanan CRC
            document.getElementById("inputText").value = fullFrameStr;

            fullFrameRow.style.display = "block";
            document.getElementById("copyMsg").textContent = "";
        }

        function copyFrame() {
            let text = document.getElementById("fullFrame").textContent;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById("copyMsg").textContent = "✓ Kopyalandı!";
                setTimeout(() => document.getElementById("copyMsg").textContent = "", 2000);
            });
        }
    </script>
</body>
</html>
